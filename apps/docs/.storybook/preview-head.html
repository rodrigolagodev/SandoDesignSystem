<!--
  Sando Design System - Color Scheme Meta Tag
  
  This enables the browser to use the appropriate color scheme for
  native elements (scrollbars, form controls, etc.) based on 
  either system preference (auto mode) or manual selection.
  
  The token system now handles theme switching via:
  1. @media queries for automatic system preference detection
  2. [data-color-mode] selectors for manual theme switches (Storybook UI)
  
  No preload script is needed because the CSS selectors handle both cases.
-->
<meta name="color-scheme" content="light dark" />

<!--
  Preview iframe canvas background.
  @storybook/addon-themes sets data-color-mode on <html>; these rules
  pick that up so the canvas (and embedded story previews in MDX docs)
  match the active mode.
-->
<style>
  html,
  body,
  .docs-story,
  .sbdocs-preview {
    background-color: #ffffff;
    transition: background-color 0.15s ease;
  }
  html[data-color-mode="dark"],
  html[data-color-mode="dark"] body,
  html[data-color-mode="dark"] .docs-story,
  html[data-color-mode="dark"] .sbdocs-preview {
    background-color: #1a1a1a;
  }
</style>

<!--
  Google Fonts - Preconnect
  
  Establish early connections to Google Fonts servers to improve load times.
  The crossorigin attribute is required for fonts.gstatic.com.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!--
  Google Fonts - Font Family Imports
  
  These fonts correspond to the Sando Design System font-family categories:
  
  INGREDIENT FONTS (Core system fonts):
  - Bebas Neue       → display (headlines, hero text)
  - Playfair Display → display-serif (elegant headlines)
  - Nunito           → rounded (friendly UI elements)
  - Barlow Condensed → condensed (compact layouts, data-dense UI)
  - Caveat           → handwritten (personal touch, annotations)
  - Roboto Slab      → slab (technical, editorial content)
  
  FLAVOR FONTS (Theme-specific):
  - Inter               → Original flavor (heading/body)
  - Plus Jakarta Sans   → Kiwi flavor (heading)
  - DM Sans             → Egg-salad & Strawberry flavors (heading/body)
  - Space Grotesk       → Tonkatsu flavor (heading)
  - Cormorant Garamond  → Strawberry flavor (heading, with italics)
  - Literata            → Egg-salad flavor (body)
  - Newsreader          → Kiwi flavor (body)
  - Merriweather        → Tonkatsu flavor (body)
  - JetBrains Mono      → Original & Strawberry flavors (mono)
  - Fira Code           → Egg-salad, Kiwi, Tonkatsu flavors (mono)
  
  Using display=swap to prevent FOIT (Flash of Invisible Text).
  All fonts are grouped into a single request for optimal performance.
-->
<link
  href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Bebas+Neue&family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Literata:wght@400;500;600;700&family=Merriweather:wght@400;700&family=Newsreader:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Slab:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
