name: Deploy Storybook

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm tokens:build

      - name: Build components
        run: pnpm components:build

      - name: Build Storybook
        run: pnpm docs:build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp -r apps/docs/storybook-static/. _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 8
        continue-on-error: true

      - name: Retry deployment (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry-2
        uses: actions/deploy-pages@v4
        timeout-minutes: 8
        continue-on-error: true

      - name: Retry deployment (attempt 3)
        if: steps.deployment-retry-2.outcome == 'failure'
        id: deployment-retry-3
        uses: actions/deploy-pages@v4
        timeout-minutes: 8

      - name: Wait for deployment propagation
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15

      - name: Health check
        run: |
          echo "Performing health check..."
          max_attempts=5
          attempt=1
          url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          while [ $attempt -le $max_attempts ]; do
            echo "Health check attempt $attempt of $max_attempts..."

            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "🎉 Storybook is accessible (HTTP $status)"
              echo "📍 Deployment URL: $url"
              exit 0
            fi

            echo "❌ Health check failed (HTTP $status)"

            if [ $attempt -lt $max_attempts ]; then
              wait_time=$((30 * attempt))
              echo "Retrying in ${wait_time} seconds..."
              sleep $wait_time
            fi

            attempt=$((attempt + 1))
          done

          echo "⚠️ Health check did not pass after $max_attempts attempts"
          echo "Deployment may still be propagating. Check manually at: $url"
          exit 1
